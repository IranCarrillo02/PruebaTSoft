included:
  - PruebaTSoft

excluded:
  - PruebaTSoft/PruebaTSoft.xcodeproj
  - .build

opt_in_rules:
  - closure_spacing
  - contains_over_first_not_nil
  - empty_count
  - fatal_error_message
  - unneeded_parentheses_in_closure_argument
  - vertical_whitespace_closing_braces

# force_unwrapping is intentionally not enabled: it flags legitimate cases like
# `URL(string: "https://...")!` on a static, compile-time-known-safe literal,
# which would force awkward `guard let` boilerplate around values that can never be nil.

# implicitly_unwrapped_optional is intentionally not enabled: it flags Apple's own standard
# XCTestCase pattern (`var app: XCUIApplication!` set up in setUpWithError()), which is the
# idiomatic, documented way to structure UI tests, not a real safety concern.

disabled_rules:
  - todo

line_length:
  warning: 120
  error: 160

type_body_length:
  warning: 300
  error: 400

function_body_length:
  warning: 60
  error: 100

identifier_name:
  min_length: 2
  excluded:
    - id
